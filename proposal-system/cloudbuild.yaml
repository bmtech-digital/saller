# ===========================================
# Cloud Build - Auto Deploy on Push to GitHub
# Repository: bmtech-digital/saller
# ===========================================

substitutions:
  _REGION: 'me-west1'
  _BACKEND_SERVICE: 'proposal-backend'
  _FRONTEND_SERVICE: 'proposal-frontend'

steps:
  # ========== BACKEND ==========

  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest'
      - './proposal-system/backend'
    id: 'build-backend'

  # Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--port'
      - '8080'
      - '--update-env-vars'
      - 'NODE_ENV=production'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Get Backend URL and save to file
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"
    id: 'get-backend-url'
    waitFor: ['deploy-backend']

  # ========== FRONTEND ==========

  # Build Frontend with dynamic Backend URL
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo "Building frontend with API URL: $${BACKEND_URL}/api"
        docker build \
          --build-arg VITE_API_URL=$${BACKEND_URL}/api \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest \
          -f ./proposal-system/frontend/Dockerfile.cloudrun \
          ./proposal-system/frontend
    id: 'build-frontend'
    waitFor: ['get-backend-url']

  # Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--port'
      - '80'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

  # ========== FINALIZE ==========

  # Update Backend CORS with Frontend URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        FRONTEND_URL=$(gcloud run services describe ${_FRONTEND_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        gcloud run services update ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --update-env-vars="FRONTEND_URL=$${FRONTEND_URL}"
        echo ""
        echo "========================================"
        echo "        DEPLOYMENT COMPLETE!"
        echo "========================================"
        echo "Frontend: $${FRONTEND_URL}"
        echo "Backend:  $(cat /workspace/backend_url.txt)"
        echo "========================================"
    id: 'finalize'
    waitFor: ['deploy-frontend']

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
