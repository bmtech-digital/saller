# Cloud Build configuration for Frontend
# Usage: gcloud builds submit --config cloudbuild.yaml --substitutions=_VITE_API_URL="https://your-backend-url/api"

substitutions:
  _VITE_API_URL: 'https://proposal-backend-xxxxx-xx.a.run.app/api'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proposal-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/proposal-frontend:latest'
      - '--build-arg'
      - 'VITE_API_URL=${_VITE_API_URL}'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/proposal-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/proposal-frontend:latest'
