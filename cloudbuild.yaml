# =====================================================================
# Cloud Build — bemtech-478413 deployment
#
# Backend  → Cloud Run (saller-backend, region me-west1)
# Frontend → Firebase Hosting (default site bemtech-478413, custom domain crm.aiweon.co.il)
#
# Run with:
#   gcloud builds submit --config=cloudbuild.yaml --project=bemtech-478413
#
# Prereqs (one-time, already applied):
#   - Firebase added to bemtech-478413
#   - Cloud Build SA (600758223942@cloudbuild.gserviceaccount.com) has:
#       roles/run.admin, roles/firebasehosting.admin,
#       roles/serviceusage.serviceUsageConsumer, roles/iam.serviceAccountUser
#   - Secret Manager: SALLER_SUPABASE_URL, SALLER_SUPABASE_ANON_KEY, SALLER_SUPABASE_SERVICE_KEY
# =====================================================================

substitutions:
  _REGION: 'me-west1'
  _BACKEND_SERVICE: 'saller-backend'
  _FRONTEND_URL: 'https://crm.aiweon.co.il'

steps:
  # ========== BACKEND ==========

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TAG="${SHORT_SHA:-latest}"
        docker build \
          -t gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$$TAG \
          -t gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest \
          ./proposal-system/backend
        echo "$$TAG" > /workspace/tag.txt
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy backend with Supabase secrets and FRONTEND_URL wired up.
  # FRONTEND_URL is the canonical custom domain (no longer derived from a *.run.app URL).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TAG=$(cat /workspace/tag.txt)
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$$TAG \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 1Gi \
          --port 8080 \
          --set-env-vars "NODE_ENV=production,FRONTEND_URL=${_FRONTEND_URL}" \
          --set-secrets "SUPABASE_URL=SALLER_SUPABASE_URL:latest,SUPABASE_ANON_KEY=SALLER_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SALLER_SUPABASE_SERVICE_KEY:latest"
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ========== FRONTEND ==========

  # Build the Vite bundle with VITE_API_URL pointing at the just-deployed backend.
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        cd proposal-system/frontend
        npm ci
        VITE_API_URL=$${BACKEND_URL}/api npm run build
    id: 'build-frontend'
    waitFor: ['deploy-backend']

  # Deploy to Firebase Hosting using ADC (no FIREBASE_TOKEN needed —
  # the Cloud Build SA has roles/firebasehosting.admin).
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools@^15
        firebase deploy --only hosting --project=$PROJECT_ID --non-interactive
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

  # ========== FINALIZE ==========

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo ""
        echo "========================================"
        echo "        DEPLOYMENT COMPLETE!"
        echo "========================================"
        echo "Frontend: ${_FRONTEND_URL}"
        echo "Backend:  $(cat /workspace/backend_url.txt)"
        echo "========================================"
    id: 'finalize'
    waitFor: ['deploy-frontend']

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
